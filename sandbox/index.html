<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanvasTextEditor Sandbox</title>
    <style>
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        background: #f5f5f5;
        font-family: sans-serif;
      }

      .sandbox {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(320px, 36%) 1fr;
        gap: 16px;
        align-items: stretch;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background: white;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
      }

      .panel label {
        font-size: 13px;
        color: #333333;
      }

      textarea {
        width: 100%;
        flex: 1;
        min-height: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.4;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        padding: 10px;
        box-sizing: border-box;
        resize: vertical;
      }

      textarea.error {
        border-color: #cc3a3a;
      }

      .error-text {
        min-height: 18px;
        color: #cc3a3a;
        font-size: 12px;
      }

      .editor-pane {
        min-height: 0;
        border: 1px solid #d0d0d0;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="sandbox">
      <div class="panel">
        <label for="model-json">Live JSON model (two-way bound)</label>
        <textarea id="model-json" spellcheck="false"></textarea>
        <div id="json-error" class="error-text"></div>
      </div>
      <div id="editor-pane" class="editor-pane">
        <canvas id="editor-canvas" width="800" height="300"></canvas>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
